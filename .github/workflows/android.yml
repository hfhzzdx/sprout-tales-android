name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate offline stories
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: :tools:generator:run --no-daemon

      - name: Build debug APK (signed)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: assembleRelease --no-daemon

      - name: Upload APKs (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Check release trigger
        id: release_check
        shell: bash
        run: |
          should="false"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            should="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            msg='${{ github.event.head_commit.message }}'
            if [[ "$msg" == *"[release]"* ]]; then
              should="true"
            fi
          fi
          echo "should_release=$should" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        if: steps.release_check.outputs.should_release == 'true'
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags --force
          latest=$(git tag -l 'v*' | sort -V | tail -n1)
          if [[ -z "$latest" ]]; then
            next="v1.0.0"
          else
            core="${latest#v}"
            IFS='.' read -r major minor patch <<< "$core"
            if [[ -z "$patch" ]]; then patch=0; fi
            next="v${major}.${minor}.$((patch+1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create tag (non-tag runs)
        if: steps.release_check.outputs.should_release == 'true' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}" -m "CI: auto tag after successful build"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.release_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          make_latest: true
}```