name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use default GITHUB_TOKEN for checkout; do not override with PAT to avoid auth failures

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate offline stories
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: :tools:generator:run --no-daemon

      - name: Build debug APK (signed)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.9
          arguments: assembleRelease --no-daemon

      - name: Sign release with debug keystore (app-release-signed-debugkey.apk)
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [[ ! -f "$APK" ]]; then
            echo "Release unsigned APK not found at $APK" >&2
            exit 1
          fi
          # Generate a throwaway debug keystore inside the workspace to avoid HOME differences
          KEY="$GITHUB_WORKSPACE/debug.keystore"
          if [[ ! -f "$KEY" ]]; then
            echo "Generating debug.keystore at $KEY"
            keytool -genkeypair -v \
              -keystore "$KEY" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -storetype JKS \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          ls -l "$KEY" || true
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BT_DIR=$(ls -d "$SDK_DIR"/build-tools/* 2>/dev/null | sort -V | tail -n1)
          if [[ -z "$BT_DIR" ]]; then
            echo "Build-Tools not found under $SDK_DIR/build-tools" >&2
            exit 1
          fi
          echo "Using Build-Tools: $BT_DIR"
          "$BT_DIR/zipalign" -p -f 4 "$APK" app/build/outputs/apk/release/app-release-aligned.apk
          "$BT_DIR/apksigner" sign \
            --ks "$KEY" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/app-release-signed-debugkey.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          "$BT_DIR/apksigner" verify --print-certs app/build/outputs/apk/release/app-release-signed-debugkey.apk

      - name: Upload APKs (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk

      - name: Check release trigger
        id: release_check
        shell: bash
        run: |
          should="false"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            should="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            msg="${{ github.event.head_commit.message }}"
            if [[ "$msg" == *"[release]"* ]]; then
              should="true"
            fi
          fi
          echo "should_release=$should" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        if: ${{ steps.release_check.outputs.should_release == 'true' }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --tags --force
          latest=$(git tag -l 'v*' | sort -V | tail -n1)
          if [[ -z "$latest" ]]; then
            next="v1.0.0"
          else
            core="${latest#v}"
            IFS='.' read -r major minor patch <<< "$core"
            if [[ -z "$patch" ]]; then patch=0; fi
            next="v${major}.${minor}.$((patch+1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create tag (non-tag runs)
        if: ${{ steps.release_check.outputs.should_release == 'true' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}" -m "CI: auto tag after successful build"
          # Ensure pushing with PAT
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub Release
        if: ${{ steps.release_check.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          make_latest: true
